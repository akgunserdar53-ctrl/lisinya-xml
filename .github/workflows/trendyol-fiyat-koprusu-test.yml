name: Trendyol tek urun fiyat KONTROL

on:
  workflow_dispatch:
    inputs:
      barcode:
        description: "Fiyati incelenecek tek barkod"
        required: true
        default: "9786051008608"
        type: string

permissions:
  contents: read

concurrency:
  group: trendyol-tek-urun-fiyat-kontrol
  cancel-in-progress: false

jobs:
  single-product-price-control:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      XML_URL: https://akgunserdar53-ctrl.github.io/lisinya-xml/lisinyakitap-guncel.xml
      TEST_BARCODE: ${{ inputs.barcode }}
      TRENDYOL_SELLER_ID: ${{ secrets.TRENDYOL_SELLER_ID }}
      TRENDYOL_API_KEY: ${{ secrets.TRENDYOL_API_KEY }}
      TRENDYOL_API_SECRET: ${{ secrets.TRENDYOL_API_SECRET }}
      TRENDYOL_STOREFRONT_CODE: TR

    steps:
      - name: XML ve Trendyol fiyatlarini karsilastir
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from decimal import Decimal, InvalidOperation

          XML_URL = os.environ["XML_URL"]
          BARCODE = os.environ["TEST_BARCODE"].strip()
          SELLER_ID = os.environ.get("TRENDYOL_SELLER_ID", "").strip()
          API_KEY = os.environ.get("TRENDYOL_API_KEY", "").strip()
          API_SECRET = os.environ.get("TRENDYOL_API_SECRET", "").strip()
          STOREFRONT = os.environ.get("TRENDYOL_STOREFRONT_CODE", "TR")
          BASE = "https://apigw.trendyol.com"
          REPORT_PATH = "trendyol-fiyat-kontrol-raporu.json"

          report = {
              "mode": "KONTROL",
              "barcode": BARCODE,
              "xmlUrl": XML_URL,
              "sent": False,
          }

          def save_report():
              with open(REPORT_PATH, "w", encoding="utf-8") as handle:
                  json.dump(report, handle, ensure_ascii=False, indent=2)

          def local_name(tag):
              return tag.rsplit("}", 1)[-1].lower()

          def child_text(product, wanted):
              for child in product:
                  if local_name(child.tag) == wanted:
                      return (child.text or "").strip()
              return ""

          def money(value, field):
              raw = str(value).strip().replace(" ", "").replace(",", ".")
              try:
                  number = Decimal(raw)
              except InvalidOperation:
                  raise SystemExit(f"Gecersiz {field}: {value!r}")
              if number <= 0:
                  raise SystemExit(f"{field} sifir veya negatif olamaz: {number}")
              return number

          def request_json(url):
              credentials = base64.b64encode(
                  f"{API_KEY}:{API_SECRET}".encode("utf-8")
              ).decode("ascii")
              headers = {
                  "Authorization": f"Basic {credentials}",
                  "User-Agent": f"{SELLER_ID} - SelfIntegration",
                  "storeFrontCode": STOREFRONT,
                  "Accept": "application/json",
              }
              request = urllib.request.Request(url, headers=headers, method="GET")
              try:
                  with urllib.request.urlopen(request, timeout=60) as response:
                      body = response.read().decode("utf-8")
                      return json.loads(body) if body else {}
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", errors="replace")
                  raise RuntimeError(
                      f"Trendyol HTTP {error.code}: {body[:2000]}"
                  ) from None

          if not BARCODE:
              raise SystemExit("Barkod bos olamaz.")
          if not all((SELLER_ID, API_KEY, API_SECRET)):
              raise SystemExit("GitHub Secrets eksik.")

          print("Temiz XML indiriliyor...")
          with urllib.request.urlopen(XML_URL, timeout=120) as response:
              tree = ET.parse(response)

          matches = []
          for product in tree.getroot().iter():
              if local_name(product.tag) != "product":
                  continue
              if child_text(product, "barkod") == BARCODE:
                  matches.append(product)

          if len(matches) != 1:
              report["xmlMatchCount"] = len(matches)
              save_report()
              raise SystemExit(
                  f"Guvenlik durdurmasi: XML'de barkod {len(matches)} kez bulundu."
              )

          product = matches[0]
          raw_xml_price = child_text(product, "price")
          xml_price = money(raw_xml_price, "XML price")
          report.update({
              "xmlMatchCount": 1,
              "xmlProductName": child_text(product, "name"),
              "xmlModel": child_text(product, "model"),
              "xmlQuantity": child_text(product, "quantity"),
              "xmlPrice": str(xml_price),
          })

          query = urllib.parse.urlencode({
              "barcode": BARCODE,
              "page": 0,
              "size": 10,
          })
          product_url = (
              f"{BASE}/integration/product/sellers/{SELLER_ID}"
              f"/products/approved?{query}"
          )
          trendyol_response = request_json(product_url)
          content = trendyol_response.get("content") or []
          exact = [
              item for item in content
              if str(item.get("barcode", "")).strip() == BARCODE
          ]
          if len(exact) != 1:
              report["trendyolMatchCount"] = len(exact)
              report["trendyolTotalElements"] = trendyol_response.get(
                  "totalElements"
              )
              save_report()
              raise SystemExit(
                  f"Guvenlik durdurmasi: Trendyol'da barkod {len(exact)} kez bulundu."
              )

          item = exact[0]
          sale_price = money(item.get("salePrice"), "Trendyol salePrice")
          list_price = money(item.get("listPrice"), "Trendyol listPrice")
          multiplier = sale_price / xml_price
          increase_percent = (multiplier - Decimal("1")) * Decimal("100")
          report.update({
              "trendyolMatchCount": 1,
              "trendyolTitle": item.get("title"),
              "trendyolSalePrice": str(sale_price),
              "trendyolListPrice": str(list_price),
              "trendyolQuantity": item.get("quantity"),
              "salePriceDividedByXmlPrice": str(multiplier.quantize(Decimal("0.0001"))),
              "increasePercentOverXmlPrice": str(
                  increase_percent.quantize(Decimal("0.01"))
              ),
              "sent": False,
          })
          save_report()

          print(f"URUN: {BARCODE} | {report['xmlProductName']}")
          print(f"XML HAM FIYAT: {xml_price} TL")
          print(f"TRENDYOL SATIS FIYATI: {sale_price} TL")
          print(f"TRENDYOL LISTE FIYATI: {list_price} TL")
          print(f"CARPAN: {multiplier.quantize(Decimal('0.0001'))}")
          print(f"XML UZERINE FARK: %{increase_percent.quantize(Decimal('0.01'))}")
          print("KONTROL modu: Trendyol'a hicbir fiyat veya stok gonderilmedi.")
          PY

      - name: Fiyat kontrol raporunu sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trendyol-fiyat-kontrol-${{ inputs.barcode }}
          path: trendyol-fiyat-kontrol-raporu.json
          if-no-files-found: warn
          retention-days: 30

