name: Trendyol tek urun fiyat koprusu TEST V2

on:
  workflow_dispatch:
    inputs:
      barcode:
        description: "Fiyati incelenecek tek barkod"
        required: true
        default: "9786051008608"
        type: string
      net_profit_percent:
        description: "Net kar orani (komisyon haric)"
        required: true
        default: "30"
        type: string
      vat_percent:
        description: "XML alis fiyatinin icindeki KDV orani"
        required: true
        default: "20"
        type: string
      commission_percent:
        description: "Pazaryeri komisyon orani"
        required: true
        default: "30"
        type: string
      mode:
        description: "KONTROL gondermez; UYGULA tek urunun fiyatini gonderir"
        required: true
        default: "KONTROL"
        type: choice
        options:
          - KONTROL
          - UYGULA
      confirmation:
        description: "UYGULA icin aynen FIYATI_GUNCELLE yazin"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: trendyol-tek-urun-fiyat-kontrol
  cancel-in-progress: false

jobs:
  single-product-price-control:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      XML_URL: https://akgunserdar53-ctrl.github.io/lisinya-xml/lisinyakitap-guncel.xml
      TEST_BARCODE: ${{ inputs.barcode }}
      NET_PROFIT_PERCENT: ${{ inputs.net_profit_percent }}
      VAT_PERCENT: ${{ inputs.vat_percent }}
      COMMISSION_PERCENT: ${{ inputs.commission_percent }}
      RUN_MODE: ${{ inputs.mode }}
      CONFIRMATION: ${{ inputs.confirmation }}
      TRENDYOL_SELLER_ID: ${{ secrets.TRENDYOL_SELLER_ID }}
      TRENDYOL_API_KEY: ${{ secrets.TRENDYOL_API_KEY }}
      TRENDYOL_API_SECRET: ${{ secrets.TRENDYOL_API_SECRET }}
      TRENDYOL_STOREFRONT_CODE: TR

    steps:
      - name: XML fiyatini hesapla ve guvenli fiyat testi yap
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          import time
          from decimal import Decimal, InvalidOperation, ROUND_HALF_UP

          XML_URL = os.environ["XML_URL"]
          BARCODE = os.environ["TEST_BARCODE"].strip()
          MODE = os.environ["RUN_MODE"].strip().upper()
          CONFIRMATION = os.environ.get("CONFIRMATION", "")
          NET_PROFIT = Decimal(os.environ["NET_PROFIT_PERCENT"])
          VAT = Decimal(os.environ["VAT_PERCENT"])
          COMMISSION = Decimal(os.environ["COMMISSION_PERCENT"])
          SELLER_ID = os.environ.get("TRENDYOL_SELLER_ID", "").strip()
          API_KEY = os.environ.get("TRENDYOL_API_KEY", "").strip()
          API_SECRET = os.environ.get("TRENDYOL_API_SECRET", "").strip()
          STOREFRONT = os.environ.get("TRENDYOL_STOREFRONT_CODE", "TR")
          BASE = "https://apigw.trendyol.com"
          REPORT_PATH = "trendyol-fiyat-kontrol-raporu.json"

          report = {
              "mode": MODE,
              "barcode": BARCODE,
              "xmlUrl": XML_URL,
              "sent": False,
          }

          def save_report():
              with open(REPORT_PATH, "w", encoding="utf-8") as handle:
                  json.dump(report, handle, ensure_ascii=False, indent=2)

          def local_name(tag):
              return tag.rsplit("}", 1)[-1].lower()

          def child_text(product, wanted):
              for child in product:
                  if local_name(child.tag) == wanted:
                      return (child.text or "").strip()
              return ""

          def money(value, field):
              raw = str(value).strip().replace(" ", "").replace(",", ".")
              try:
                  number = Decimal(raw)
              except InvalidOperation:
                  raise SystemExit(f"Gecersiz {field}: {value!r}")
              if number <= 0:
                  raise SystemExit(f"{field} sifir veya negatif olamaz: {number}")
              return number

          def request_json(method, url, payload=None):
              credentials = base64.b64encode(
                  f"{API_KEY}:{API_SECRET}".encode("utf-8")
              ).decode("ascii")
              headers = {
                  "Authorization": f"Basic {credentials}",
                  "User-Agent": f"{SELLER_ID} - SelfIntegration",
                  "storeFrontCode": STOREFRONT,
                  "Accept": "application/json",
              }
              data = None
              if payload is not None:
                  headers["Content-Type"] = "application/json"
                  data = json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(
                  url, data=data, headers=headers, method=method
              )
              try:
                  with urllib.request.urlopen(request, timeout=60) as response:
                      body = response.read().decode("utf-8")
                      return json.loads(body) if body else {}
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", errors="replace")
                  raise RuntimeError(
                      f"Trendyol HTTP {error.code}: {body[:2000]}"
                  ) from None

          if not BARCODE:
              raise SystemExit("Barkod bos olamaz.")
          if MODE not in {"KONTROL", "UYGULA"}:
              raise SystemExit("Gecersiz mod.")
          if NET_PROFIT < 0 or VAT < 0:
              raise SystemExit("Kar ve KDV negatif olamaz.")
          if COMMISSION < 0 or COMMISSION >= 100:
              raise SystemExit("Komisyon 0 dahil, 100 haric araliginda olmali.")
          if not all((SELLER_ID, API_KEY, API_SECRET)):
              raise SystemExit("GitHub Secrets eksik.")

          print("Temiz XML indiriliyor...")
          with urllib.request.urlopen(XML_URL, timeout=120) as response:
              tree = ET.parse(response)

          matches = []
          for product in tree.getroot().iter():
              if local_name(product.tag) != "product":
                  continue
              if child_text(product, "barkod") == BARCODE:
                  matches.append(product)

          if len(matches) != 1:
              report["xmlMatchCount"] = len(matches)
              save_report()
              raise SystemExit(
                  f"Guvenlik durdurmasi: XML'de barkod {len(matches)} kez bulundu."
              )

          product = matches[0]
          raw_xml_price = child_text(product, "price")
          xml_price = money(raw_xml_price, "XML price")
          # XML ayarinda alis fiyati KDV dahil oldugu icin KDV tekrar
          # carpilmiyor. PazarAPI tablosundaki artis formulu:
          # satis = alis * (1 + net kar) / (1 - komisyon)
          target_price = (
              xml_price
              * (Decimal("1") + NET_PROFIT / Decimal("100"))
              / (Decimal("1") - COMMISSION / Decimal("100"))
          ).quantize(Decimal("0.01"), rounding=ROUND_HALF_UP)
          target_multiplier = target_price / xml_price
          if target_price <= 0 or target_price > Decimal("1000000"):
              raise SystemExit(f"Guvenlik durdurmasi: hesaplanan fiyat {target_price}")
          if target_multiplier > Decimal("5"):
              raise SystemExit(
                  f"Guvenlik durdurmasi: fiyat carpani cok yuksek: {target_multiplier}"
              )
          report.update({
              "xmlMatchCount": 1,
              "xmlProductName": child_text(product, "name"),
              "xmlModel": child_text(product, "model"),
              "xmlQuantity": child_text(product, "quantity"),
              "xmlPrice": str(xml_price),
              "netProfitPercent": str(NET_PROFIT),
              "vatPercentAlreadyIncludedInXmlPrice": str(VAT),
              "commissionPercent": str(COMMISSION),
              "calculatedSalePrice": str(target_price),
          })

          query = urllib.parse.urlencode({
              "barcode": BARCODE,
              "page": 0,
              "size": 10,
          })
          product_url = (
              f"{BASE}/integration/product/sellers/{SELLER_ID}"
              f"/products/approved?{query}"
          )
          trendyol_response = request_json("GET", product_url)
          content = trendyol_response.get("content") or []
          exact = [
              item for item in content
              if str(item.get("barcode", "")).strip() == BARCODE
          ]
          if len(exact) != 1:
              report["trendyolMatchCount"] = len(exact)
              report["trendyolTotalElements"] = trendyol_response.get(
                  "totalElements"
              )
              save_report()
              raise SystemExit(
                  f"Guvenlik durdurmasi: Trendyol'da barkod {len(exact)} kez bulundu."
              )

          item = exact[0]
          sale_price = money(item.get("salePrice"), "Trendyol salePrice")
          list_price = money(item.get("listPrice"), "Trendyol listPrice")
          multiplier = sale_price / xml_price
          increase_percent = (multiplier - Decimal("1")) * Decimal("100")
          report.update({
              "trendyolMatchCount": 1,
              "trendyolTitle": item.get("title"),
              "trendyolSalePrice": str(sale_price),
              "trendyolListPrice": str(list_price),
              "trendyolQuantity": item.get("quantity"),
              "salePriceDividedByXmlPrice": str(multiplier.quantize(Decimal("0.0001"))),
              "increasePercentOverXmlPrice": str(
                  increase_percent.quantize(Decimal("0.01"))
              ),
              "sent": False,
          })
          save_report()

          print(f"URUN: {BARCODE} | {report['xmlProductName']}")
          print(f"XML HAM FIYAT: {xml_price} TL")
          print(f"TRENDYOL SATIS FIYATI: {sale_price} TL")
          print(f"TRENDYOL LISTE FIYATI: {list_price} TL")
          print(f"MEVCUT CARPAN: {multiplier.quantize(Decimal('0.0001'))}")
          print(f"XML UZERINE FARK: %{increase_percent.quantize(Decimal('0.01'))}")
          print(
              f"PAZARAPI FORMULU: %{NET_PROFIT} net kar, "
              f"%{COMMISSION} komisyon; XML fiyatinda %{VAT} KDV zaten dahil"
          )
          print(f"HESAPLANAN YENI SATIS FIYATI: {target_price} TL")

          if MODE == "KONTROL":
              print("KONTROL modu: Trendyol'a hicbir fiyat veya stok gonderilmedi.")
              save_report()
              raise SystemExit(0)

          if CONFIRMATION != "FIYATI_GUNCELLE":
              raise SystemExit(
                  "UYGULA icin confirmation alanina FIYATI_GUNCELLE yazilmali."
              )

          # Stok alani bilerek gonderilmiyor; yalnizca bu tek barkodun
          # satis ve liste fiyati ayni hesaplanan degere cekiliyor.
          payload = {
              "items": [{
                  "barcode": BARCODE,
                  "salePrice": float(target_price),
                  "listPrice": float(target_price),
              }]
          }
          update_url = (
              f"{BASE}/integration/inventory/sellers/{SELLER_ID}"
              "/products/price-and-inventory"
          )
          submitted = request_json("POST", update_url, payload)
          batch_id = submitted.get("batchRequestId")
          if not batch_id:
              report["submitResponse"] = submitted
              save_report()
              raise SystemExit("Trendyol batchRequestId dondurmedi.")

          report.update({"sent": True, "batchRequestId": batch_id})
          save_report()
          print(f"Trendyol kabul etti. batchRequestId={batch_id}")

          batch_url = (
              f"{BASE}/integration/product/sellers/{SELLER_ID}"
              f"/products/batch-requests/{urllib.parse.quote(batch_id)}"
          )
          result = {}
          for attempt in range(1, 31):
              result = request_json("GET", batch_url)
              status = str(result.get("status", "")).upper()
              print(f"Sonuc sorgusu {attempt}/30: {status or 'BEKLIYOR'}")
              if status in {"COMPLETED", "FAILED"}:
                  break
              time.sleep(5)
          else:
              report["batchResult"] = result
              save_report()
              raise SystemExit("Batch 150 saniyede tamamlanmadi.")

          report["batchResult"] = result
          save_report()
          items = result.get("items") or []
          failed_items = [
              batch_item for batch_item in items
              if str(batch_item.get("status", "")).upper() != "SUCCESS"
          ]
          if str(result.get("status", "")).upper() != "COMPLETED":
              raise SystemExit(f"Batch basarisiz: {result.get('status')}")
          if int(result.get("failedItemCount") or 0) or failed_items:
              reasons = [
                  batch_item.get("failureReasons")
                  for batch_item in failed_items
              ]
              raise SystemExit(f"Fiyat guncellenemedi: {reasons}")

          print(
              f"BASARILI: Trendyol {BARCODE} barkodunun fiyatini "
              f"{target_price} TL olarak tamamladi."
          )
          PY

      - name: Fiyat test raporunu sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trendyol-fiyat-test-${{ inputs.barcode }}
          path: trendyol-fiyat-kontrol-raporu.json
          if-no-files-found: warn
          retention-days: 30
