name: Lisinya temiz XML

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: lisinya-pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: XML indir ve yasakli ifadeleri temizle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          curl --fail --location --retry 4 --retry-delay 10 \
            "https://www.lisinya.com/storage/cache/feed/0-lisinyakitap.xml" \
            --output kaynak.xml

          python3 - <<'PY'
          import re
          import xml.etree.ElementTree as ET

          source = "kaynak.xml"
          target = "public/lisinyakitap-guncel.xml"

          forbidden = [
              ("AV", re.compile(r"(?<!\w)AV(?!\w)", re.IGNORECASE)),
              ("SİLAH", re.compile(r"(?<!\w)S[Iİ]LAH(?!\w)", re.IGNORECASE)),
              ("TETİK", re.compile(r"(?<!\w)TET[Iİ]K(?!\w)", re.IGNORECASE)),
              ("NAMLU", re.compile(r"(?<!\w)NAMLU(?!\w)", re.IGNORECASE)),
              (
                  "NATIONAL GEOGRAPHIC",
                  re.compile(
                      r"(?<!\w)NATIONAL\s+GEOGRAPHIC(?!\w)",
                      re.IGNORECASE,
                  ),
              ),
          ]

          lisinya_patterns = [
              re.compile(
                  r"Ürün\s+Markası\s*:\s*Lisinya(?:\s+Kitap)?",
                  re.IGNORECASE,
              ),
              re.compile(r"\bTRY\s+Lisinya\s+Kitap\b", re.IGNORECASE),
              re.compile(r"\bLisinya\s+Kitap\b", re.IGNORECASE),
              re.compile(r"\bLisinya\b", re.IGNORECASE),
          ]

          text_tags = {"name", "description"}
          code_tags = {"barkod", "model"}
          counts = {name: 0 for name, _ in forbidden}
          counts.update({"LISINYA": 0, "K0707": 0, "MARKA_NO_NAME": 0})

          def local_name(tag):
              return tag.rsplit("}", 1)[-1].lower()

          def clean_text(value):
              for pattern in lisinya_patterns:
                  value, count = pattern.subn("", value)
                  counts["LISINYA"] += count
              for name, pattern in forbidden:
                  value, count = pattern.subn("", value)
                  counts[name] += count
              value = re.sub(r"[ \t]{2,}", " ", value)
              value = re.sub(r"\s+(<br\s*/?>)", r"\1", value, flags=re.I)
              return value.strip(" -|:")

          tree = ET.parse(source)
          root = tree.getroot()

          for element in root.iter():
              tag = local_name(element.tag)
              value = element.text or ""

              if tag in code_tags:
                  cleaned, count = re.subn(
                      r"-k0707$", "", value.strip(), flags=re.IGNORECASE
                  )
                  element.text = cleaned
                  counts["K0707"] += count
              elif tag in text_tags:
                  element.text = clean_text(value)
              elif tag == "brand" and re.search(
                  r"\blisinya\b", value, flags=re.IGNORECASE
              ):
                  cleaned = clean_text(value)
                  element.text = cleaned or "No Name"
                  if not cleaned:
                      counts["MARKA_NO_NAME"] += 1

          tree.write(
              target,
              encoding="utf-8",
              xml_declaration=True,
              short_empty_elements=True,
          )

          print("Temizlenen ifadeler:", counts)
          PY

          touch public/.nojekyll
          printf '%s\n' \
            '<!doctype html><meta charset="utf-8"><title>Lisinya XML</title><p>XML akisi hazir.</p>' \
            > public/index.html

      - name: XML dogrula
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import re
          import xml.etree.ElementTree as ET

          path = "public/lisinyakitap-guncel.xml"
          products = 0
          barcodes = 0
          suffixes = 0
          forbidden_hits = []

          forbidden = [
              re.compile(r"(?<!\w)AV(?!\w)", re.IGNORECASE),
              re.compile(r"(?<!\w)S[Iİ]LAH(?!\w)", re.IGNORECASE),
              re.compile(r"(?<!\w)TET[Iİ]K(?!\w)", re.IGNORECASE),
              re.compile(r"(?<!\w)NAMLU(?!\w)", re.IGNORECASE),
              re.compile(
                  r"(?<!\w)NATIONAL\s+GEOGRAPHIC(?!\w)",
                  re.IGNORECASE,
              ),
              re.compile(r"\blisinya\b", re.IGNORECASE),
          ]

          def local_name(tag):
              return tag.rsplit("}", 1)[-1].lower()

          for _, element in ET.iterparse(path, events=("end",)):
              tag = local_name(element.tag)
              value = element.text or ""
              if tag == "product":
                  products += 1
              elif tag == "barkod":
                  barcodes += 1
                  if value.lower().endswith("-k0707"):
                      suffixes += 1
              elif tag == "model" and value.lower().endswith("-k0707"):
                  suffixes += 1
              elif tag in {"name", "description", "brand"}:
                  for pattern in forbidden:
                      if pattern.search(value):
                          forbidden_hits.append(
                              f"{tag}: {pattern.pattern}"
                          )
              element.clear()

          size = os.path.getsize(path)

          if products < 10000:
              raise SystemExit(f"Beklenmeyen urun sayisi: {products}")
          if barcodes != products:
              raise SystemExit(
                  f"Urun/barkod sayisi uyusmuyor: {products}/{barcodes}"
              )
          if suffixes:
              raise SystemExit(
                  f"Temizlenmemis barkod sayisi: {suffixes}"
              )
          if forbidden_hits:
              raise SystemExit(
                  "Temizlenmemis metin alanlari: "
                  f"{forbidden_hits[:20]}"
              )
          if size < 10_000_000:
              raise SystemExit(
                  f"XML beklenenden kucuk: {size} bayt"
              )

          print(
              f"Dogrulandi: {products} urun, "
              f"{barcodes} temiz barkod, {size} bayt"
          )
          PY

      - name: Pages ayarlari
        uses: actions/configure-pages@v5

      - name: Pages paketini hazirla
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Yayinla
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Aylik etkinlik kaydi
        shell: bash
        run: |
          month="$(date -u +%Y-%m)"
          old="$(cat .last-success-month 2>/dev/null || true)"
          if [ "$old" != "$month" ]; then
            printf '%s\n' "$month" > .last-success-month
            git config user.name "github-actions[bot]"
            git config user.email \
              "41898282+github-actions[bot]@users.noreply.github.com"
            git add .last-success-month
            git commit -m "Aylik otomasyon kaydi: $month"
            git push
          fi
