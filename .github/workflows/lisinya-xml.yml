name: Lisinya temiz XML

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: lisinya-pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: XML indir ve barkodlari temizle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          curl --fail --location --retry 4 --retry-delay 10 \
            "https://www.lisinya.com/storage/cache/feed/0-lisinyakitap.xml" \
            --output kaynak.xml
          sed 's/-k0707<\/barkod>/<\/barkod>/g' kaynak.xml \
            > public/lisinyakitap-guncel.xml
          touch public/.nojekyll
          printf '%s\n' '<!doctype html><meta charset="utf-8"><title>Lisinya XML</title><p>XML akisi hazir.</p>' \
            > public/index.html

      - name: XML dogrula
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          path = "public/lisinyakitap-guncel.xml"
          products = barcodes = suffixes = 0
          for _, element in ET.iterparse(path, events=("end",)):
              if element.tag == "product":
                  products += 1
              elif element.tag == "barkod":
                  barcodes += 1
                  if (element.text or "").endswith("-k0707"):
                      suffixes += 1
              element.clear()

          size = os.path.getsize(path)
          if products < 10000:
              raise SystemExit(f"Beklenmeyen urun sayisi: {products}")
          if barcodes != products:
              raise SystemExit(f"Urun/barkod sayisi uyusmuyor: {products}/{barcodes}")
          if suffixes:
              raise SystemExit(f"Temizlenmemis barkod sayisi: {suffixes}")
          if size < 10_000_000:
              raise SystemExit(f"XML beklenenden kucuk: {size} bayt")
          print(f"Dogrulandi: {products} urun, {barcodes} temiz barkod, {size} bayt")
          PY

      - name: Pages ayarlari
        uses: actions/configure-pages@v5

      - name: Pages paketini hazirla
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Yayinla
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Aylik etkinlik kaydi
        shell: bash
        run: |
          month="$(date -u +%Y-%m)"
          old="$(cat .last-success-month 2>/dev/null || true)"
          if [ "$old" != "$month" ]; then
            printf '%s\n' "$month" > .last-success-month
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .last-success-month
            git commit -m "Aylik otomasyon kaydi: $month"
            git push
          fi
